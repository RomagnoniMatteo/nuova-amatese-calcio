<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- sfondo trasparente -->
  <rect width="16" height="16" fill="none"/>

  <!-- metà superiore rossa (pixel) -->
  <rect x="4" y="1" width="8" height="1" fill="#d64550"/>
  <rect x="2" y="2" width="12" height="1" fill="#d64550"/>
  <rect x="1" y="3" width="14" height="4" fill="#d64550"/>

  <!-- banda nera centrale -->
  <rect x="1" y="7" width="14" height="2" fill="#141414"/>

  <!-- metà inferiore bianca (pixel) -->
  <rect x="1" y="9" width="14" height="4" fill="#f7f3ea"/>
  <rect x="2" y="13" width="12" height="1" fill="#f7f3ea"/>
  <rect x="4" y="14" width="8" height="1" fill="#f7f3ea"/>

  <!-- bottone centrale -->
  <rect x="6" y="6" width="4" height="4" fill="#141414"/>
  <rect x="7" y="7" width="2" height="2" fill="#f7f3ea"/>
</svg>